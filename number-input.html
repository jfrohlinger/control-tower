<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Number Input</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f0f2f5;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .window {
      background: #ffffff;
      border-radius: 8px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.12);
      width: 360px;
      overflow: hidden;
    }

    .title-bar {
      background: #4a90e2;
      color: #fff;
      padding: 14px 20px;
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 0.3px;
    }

    .body {
      padding: 28px 24px 24px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: #555;
      margin-bottom: 8px;
    }

    input[type="number"] {
      width: 100%;
      padding: 10px 12px;
      font-size: 15px;
      border: 1.5px solid #d0d5dd;
      border-radius: 6px;
      outline: none;
      transition: border-color 0.2s;
      -moz-appearance: textfield;
    }

    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button {
      opacity: 1;
    }

    input[type="number"]:focus {
      border-color: #4a90e2;
      box-shadow: 0 0 0 3px rgba(74, 144, 226, 0.15);
    }

    input[type="number"].invalid {
      border-color: #e74c3c;
      box-shadow: 0 0 0 3px rgba(231, 76, 60, 0.15);
    }

    .error-msg {
      font-size: 12px;
      color: #e74c3c;
      margin-top: 6px;
      min-height: 16px;
    }

    .actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 24px;
    }

    button {
      padding: 9px 20px;
      font-size: 14px;
      font-weight: 500;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.15s;
    }

    .btn-cancel {
      background: #f0f2f5;
      color: #444;
    }

    .btn-cancel:hover {
      background: #e4e6ea;
    }

    .btn-submit {
      background: #4a90e2;
      color: #fff;
    }

    .btn-submit:hover {
      background: #357abd;
    }

    .result {
      margin-top: 20px;
      padding: 12px 14px;
      background: #eaf4ec;
      border-left: 4px solid #27ae60;
      border-radius: 4px;
      font-size: 14px;
      color: #1e7e34;
      display: none;
    }
  </style>
</head>
<body>
  <div class="window">
    <div class="title-bar">Enter a Number</div>
    <div class="body">
      <label for="numberInput">Please enter a number:</label>
      <input
        type="number"
        id="numberInput"
        placeholder="e.g. 42"
        autofocus
      />
      <div class="error-msg" id="errorMsg"></div>

      <div class="actions">
        <button class="btn-cancel" id="cancelBtn">Cancel</button>
        <button class="btn-submit" id="submitBtn">Submit</button>
      </div>

      <div class="result" id="result"></div>
    </div>
  </div>

  <script>
    const input = document.getElementById("numberInput");
    const errorMsg = document.getElementById("errorMsg");
    const result = document.getElementById("result");
    const submitBtn = document.getElementById("submitBtn");
    const cancelBtn = document.getElementById("cancelBtn");

    function validate() {
      const val = input.value.trim();
      if (val === "") {
        setError("Please enter a number.");
        return false;
      }
      if (isNaN(Number(val))) {
        setError("That is not a valid number.");
        return false;
      }
      clearError();
      return true;
    }

    function setError(msg) {
      errorMsg.textContent = msg;
      input.classList.add("invalid");
    }

    function clearError() {
      errorMsg.textContent = "";
      input.classList.remove("invalid");
    }

    submitBtn.addEventListener("click", () => {
      if (!validate()) return;
      const num = Number(input.value.trim());
      result.textContent = `You entered: ${num}`;
      result.style.display = "block";
    });

    cancelBtn.addEventListener("click", () => {
      input.value = "";
      clearError();
      result.style.display = "none";
      input.focus();
    });

    input.addEventListener("input", () => {
      if (input.value.trim() !== "") clearError();
      result.style.display = "none";
    });

    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter") submitBtn.click();
      if (e.key === "Escape") cancelBtn.click();
    });
  </script>
</body>
</html>
