<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Control Tower</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      padding: 32px 24px;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 32px;
    }

    header h1 {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 0.5px;
      color: #f8fafc;
    }

    header h1 span {
      color: #60a5fa;
    }

    .add-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 6px;
      color: #94a3b8;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .add-btn:hover { background: #273549; color: #e2e8f0; }
    .add-btn svg { width: 14px; height: 14px; }

    /* ── Panel grid ── */
    #panels {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }

    /* ── Individual panel ── */
    .panel {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 10px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      position: relative;
      transition: border-color 0.2s;
    }
    .panel:focus-within { border-color: #60a5fa; }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .panel-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #64748b;
    }

    .remove-btn {
      background: none;
      border: none;
      color: #475569;
      cursor: pointer;
      padding: 2px;
      line-height: 1;
      border-radius: 4px;
      transition: color 0.15s, background 0.15s;
      display: flex;
      align-items: center;
    }
    .remove-btn:hover { color: #f87171; background: rgba(248,113,113,0.1); }
    .remove-btn svg { width: 14px; height: 14px; }

    /* Name input */
    .name-input {
      background: transparent;
      border: none;
      border-bottom: 1px solid #334155;
      color: #f1f5f9;
      font-size: 15px;
      font-weight: 600;
      width: 100%;
      padding: 2px 0 6px;
      outline: none;
      transition: border-color 0.2s;
    }
    .name-input:focus { border-bottom-color: #60a5fa; }

    /* Row: value + formula */
    .row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    .field.grow { flex: 1; }

    .field-label {
      font-size: 10px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: #475569;
    }

    .num-input, .op-select {
      background: #0f1117;
      border: 1px solid #334155;
      border-radius: 6px;
      color: #f1f5f9;
      font-size: 14px;
      padding: 8px 10px;
      outline: none;
      width: 100%;
      transition: border-color 0.2s;
    }
    .num-input:focus, .op-select:focus { border-color: #60a5fa; }
    .num-input { -moz-appearance: textfield; }
    .num-input::-webkit-inner-spin-button { opacity: 1; }

    .op-select { cursor: pointer; }
    .op-select option { background: #1e293b; }

    /* Slider */
    input[type="range"] {
      width: 100%;
      accent-color: #60a5fa;
      cursor: pointer;
    }

    /* Sub-result */
    .sub-result {
      background: #0f1117;
      border: 1px solid #1e40af;
      border-radius: 6px;
      padding: 10px 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .sub-result-formula {
      font-size: 11px;
      color: #64748b;
      font-family: "SFMono-Regular", Consolas, monospace;
    }

    .sub-result-value {
      font-size: 18px;
      font-weight: 700;
      color: #60a5fa;
      font-family: "SFMono-Regular", Consolas, monospace;
    }

    /* ── Master output ── */
    #output-bar {
      background: linear-gradient(135deg, #1e3a5f 0%, #1e293b 100%);
      border: 1px solid #1d4ed8;
      border-radius: 10px;
      padding: 24px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
    }

    .output-left { flex: 1; }

    .output-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: #60a5fa;
      margin-bottom: 4px;
    }

    .output-breakdown {
      font-size: 12px;
      color: #64748b;
      font-family: "SFMono-Regular", Consolas, monospace;
      min-height: 16px;
      word-break: break-all;
    }

    .output-right {
      text-align: right;
    }

    .output-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #93c5fd;
      margin-bottom: 4px;
    }

    .output-value {
      font-size: 42px;
      font-weight: 800;
      color: #ffffff;
      font-family: "SFMono-Regular", Consolas, monospace;
      line-height: 1;
      text-shadow: 0 0 24px rgba(96,165,250,0.5);
    }

    /* empty state */
    #empty-state {
      text-align: center;
      padding: 40px;
      color: #475569;
      font-size: 14px;
      display: none;
    }
  </style>
</head>
<body>
  <header>
    <h1>Control <span>Tower</span></h1>
    <button class="add-btn" id="addBtn">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="8" y1="2" x2="8" y2="14"/><line x1="2" y1="8" x2="14" y2="8"/>
      </svg>
      Add Input
    </button>
  </header>

  <div id="panels"></div>
  <div id="empty-state">No inputs yet. Click "Add Input" to get started.</div>

  <div id="output-bar">
    <div class="output-left">
      <div class="output-title">Calculation Breakdown</div>
      <div class="output-breakdown" id="breakdown">—</div>
    </div>
    <div class="output-right">
      <div class="output-label">Final Output</div>
      <div class="output-value" id="finalOutput">0</div>
    </div>
  </div>

  <script>
    let panelCount = 0;
    const OPERATIONS = [
      { value: "multiply", label: "× Weight" },
      { value: "square",   label: "x²" },
      { value: "sqrt",     label: "√x" },
      { value: "percent",  label: "% of Weight" },
      { value: "log",      label: "log(x)" },
      { value: "noop",     label: "Pass-through" },
    ];

    function fmt(n) {
      if (!isFinite(n)) return "—";
      return parseFloat(n.toFixed(4)).toLocaleString();
    }

    function compute(value, op, weight) {
      const v = parseFloat(value);
      const w = parseFloat(weight);
      if (isNaN(v)) return NaN;
      switch (op) {
        case "multiply": return v * (isNaN(w) ? 1 : w);
        case "square":   return v * v;
        case "sqrt":     return Math.sqrt(Math.abs(v));
        case "percent":  return (v / 100) * (isNaN(w) ? 1 : w);
        case "log":      return v > 0 ? Math.log10(v) : NaN;
        case "noop":     return v;
        default:         return v;
      }
    }

    function formulaString(name, value, op, weight) {
      const v = isNaN(parseFloat(value)) ? "?" : parseFloat(value);
      const w = isNaN(parseFloat(weight)) ? "1" : parseFloat(weight);
      switch (op) {
        case "multiply": return `${v} × ${w}`;
        case "square":   return `${v}²`;
        case "sqrt":     return `√${v}`;
        case "percent":  return `${v}% of ${w}`;
        case "log":      return `log₁₀(${v})`;
        case "noop":     return `${v}`;
        default:         return `${v}`;
      }
    }

    function needsWeight(op) {
      return op === "multiply" || op === "percent";
    }

    function recalcAll() {
      const panels = document.querySelectorAll(".panel");
      const parts = [];
      let total = 0;

      panels.forEach(panel => {
        const valInput   = panel.querySelector(".num-input[data-role='value']");
        const wtInput    = panel.querySelector(".num-input[data-role='weight']");
        const opSelect   = panel.querySelector(".op-select");
        const nameInput  = panel.querySelector(".name-input");
        const subVal     = panel.querySelector(".sub-result-value");
        const subFormula = panel.querySelector(".sub-result-formula");

        const val = valInput.value;
        const wt  = wtInput.value;
        const op  = opSelect.value;
        const name = nameInput.value || "Input";

        const result = compute(val, op, wt);
        subVal.textContent = isFinite(result) && !isNaN(result) ? fmt(result) : "—";
        subFormula.textContent = formulaString(name, val, op, wt);

        if (isFinite(result) && !isNaN(result)) {
          total += result;
          parts.push(`${fmt(result)}`);
        }
      });

      document.getElementById("finalOutput").textContent = fmt(total);
      document.getElementById("breakdown").textContent =
        parts.length ? parts.join(" + ") + " = " + fmt(total) : "—";

      document.getElementById("empty-state").style.display =
        panels.length === 0 ? "block" : "none";
    }

    function addPanel(defaults = {}) {
      panelCount++;
      const id = panelCount;
      const {
        name   = `Input ${id}`,
        value  = "",
        op     = "multiply",
        weight = "1",
      } = defaults;

      const panel = document.createElement("div");
      panel.className = "panel";
      panel.dataset.id = id;

      const opOptions = OPERATIONS.map(o =>
        `<option value="${o.value}"${o.value === op ? " selected" : ""}>${o.label}</option>`
      ).join("");

      panel.innerHTML = `
        <div class="panel-header">
          <span class="panel-label">Panel ${id}</span>
          <button class="remove-btn" title="Remove">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="3" y1="3" x2="13" y2="13"/>
              <line x1="13" y1="3" x2="3" y2="13"/>
            </svg>
          </button>
        </div>

        <input class="name-input" type="text" value="${name}" placeholder="Label this input…" />

        <div>
          <div class="field-label" style="margin-bottom:6px">Value</div>
          <input type="range" class="slider" min="-100" max="100" step="0.1" value="${value || 0}" />
          <div class="row" style="margin-top:8px">
            <div class="field grow">
              <input class="num-input" data-role="value" type="number" value="${value}" placeholder="0" />
            </div>
          </div>
        </div>

        <div class="field">
          <div class="field-label">Operation</div>
          <select class="op-select">${opOptions}</select>
        </div>

        <div class="field weight-field" style="${needsWeight(op) ? '' : 'display:none'}">
          <div class="field-label">Weight / Multiplier</div>
          <input class="num-input" data-role="weight" type="number" value="${weight}" placeholder="1" />
        </div>

        <div class="sub-result">
          <span class="sub-result-formula">—</span>
          <span class="sub-result-value">—</span>
        </div>
      `;

      // Sync slider ↔ number input
      const slider   = panel.querySelector(".slider");
      const valInput = panel.querySelector(".num-input[data-role='value']");
      slider.addEventListener("input", () => { valInput.value = slider.value; recalcAll(); });
      valInput.addEventListener("input", () => {
        const n = parseFloat(valInput.value);
        if (!isNaN(n)) slider.value = Math.min(100, Math.max(-100, n));
        recalcAll();
      });

      // Op change → show/hide weight
      const opSelect     = panel.querySelector(".op-select");
      const weightField  = panel.querySelector(".weight-field");
      opSelect.addEventListener("change", () => {
        weightField.style.display = needsWeight(opSelect.value) ? "" : "none";
        recalcAll();
      });

      // Weight input
      panel.querySelector(".num-input[data-role='weight']")
           .addEventListener("input", recalcAll);

      // Name input
      panel.querySelector(".name-input").addEventListener("input", recalcAll);

      // Remove
      panel.querySelector(".remove-btn").addEventListener("click", () => {
        panel.remove();
        recalcAll();
      });

      document.getElementById("panels").appendChild(panel);
      recalcAll();
    }

    document.getElementById("addBtn").addEventListener("click", () => addPanel());

    // Seed with 3 panels
    addPanel({ name: "Revenue",  value: 85,  op: "multiply", weight: "1.2" });
    addPanel({ name: "Costs",    value: 40,  op: "multiply", weight: "0.8" });
    addPanel({ name: "Bonus",    value: 10,  op: "square" });
  </script>
</body>
</html>
